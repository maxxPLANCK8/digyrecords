  <!-- Corner-bracket viewfinder mark, amber, centered within safe zone -->
  <g stroke="#D98E2B" stroke-width="30" stroke-linecap="square" fill="none">
    <!-- top-left -->
    <path d="M 146 176 L 146 146 L 176 146"/>
    <!-- top-right -->
    <path d="M 336 146 L 366 146 L 366 176"/>
    <!-- bottom-left -->
    <path d="M 146 336 L 146 366 L 176 366"/>
    <!-- bottom-right -->
    <path d="M 366 336 L 366 366 L 336 366"/>
  </g>

  <!-- center scan line -->
  <rect x="196" y="250" width="120" height="12" rx="2" fill="#D98E2B"/>
</svg>
